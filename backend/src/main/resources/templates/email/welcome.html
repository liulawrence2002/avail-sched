<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited</title>
  <style>
    body { margin: 0; padding: 0; background-color: #0a0a0f; font-family: 'Inter', system-ui, sans-serif; }
    .container { max-width: 480px; margin: 0 auto; padding: 40px 24px; }
    .card { background: #111118; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 32px; }
    .logo { font-family: 'Playfair Display', Georgia, serif; color: #d4af37; font-size: 22px; margin-bottom: 24px; }
    h1 { color: #f5f0e1; font-size: 20px; font-weight: 600; margin: 0 0 12px; }
    p { color: #b8b3a8; font-size: 14px; line-height: 1.6; margin: 0 0 16px; }
    .button { display: inline-block; background: #d4af37; color: #0a0a0f; text-decoration: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; }
    .button:hover { background: #e4c25a; }
    .footer { text-align: center; margin-top: 24px; color: #5c5954; font-size: 12px; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Goblin Scheduler</div>
      <h1>You're invited, <span th:text="${participantName}">Friend</span>!</h1>
      <p><strong th:text="${eventTitle}" style="color:#f5f0e1;">Event Title</strong></p>
      <p th:if="${eventDescription}" th:text="${eventDescription}">Description</p>
      <p>Click below to mark your availability and help find the perfect time.</p>
      <a th:href="${availabilityLink}" class="button">Mark My Availability</a>
      <div class="divider"></div>
      <p style="font-size:12px;color:#5c5954;">Or copy this link:<br><span th:text="${availabilityLink}" style="color:#8a8780;word-break:break-all;">link</span></p>
    </div>
    <div class="footer">
      Sent by Goblin Scheduler · <a th:href="${appUrl}" style="color:#5c5954;">Open App</a>
    </div>
  </div>
</body>
</html>
