# Dev-profile overrides. Activated automatically when SPRING_PROFILES_ACTIVE is unset.
#
# This file restores convenient localhost defaults that live outside the base application.yml
# so production deploys (which MUST set SPRING_PROFILES_ACTIVE=prod) cannot accidentally fall
# back to them. Env vars still take precedence when they are set, so docker-compose fullstack
# and CI can inject their own values without editing this file.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goblin_sched}
    username: ${SPRING_DATASOURCE_USERNAME:goblin}
    password: ${SPRING_DATASOURCE_PASSWORD:goblin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
