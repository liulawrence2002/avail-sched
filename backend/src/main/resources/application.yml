spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goblin_sched}
    username: ${SPRING_DATASOURCE_USERNAME:goblin}
    password: ${SPRING_DATASOURCE_PASSWORD:goblin}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173}
  base-url: ${APP_BASE_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

info:
  app:
    name: Goblin Scheduler
    version: 0.0.1-SNAPSHOT
    description: Group availability scheduler — zero accounts required
