spring:
  # Local runs (./gradlew bootRun, tests) pick up application-dev.yml automatically.
  # Production deploys must set SPRING_PROFILES_ACTIVE explicitly so dev defaults can never leak.
  profiles:
    default: dev
  datasource:
    # Placeholders have NO fallback values: a prod-profile startup without secrets will fail fast
    # with a clear "Could not resolve placeholder" error instead of silently starting with dev
    # credentials. (Phase 1.6 fail-fast hardening.)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173}
  base-url: ${APP_BASE_URL:http://localhost:5173}
  scoring:
    # Availability cutoffs used by ScoringService to bucket each participant. Defaults mirror
    # the historical hand-tuned numbers locked in by ScoringServiceTest; override via env if a
    # deployment wants stricter "yes" or laxer "bribe" buckets.
    yes-threshold: ${APP_SCORING_YES_THRESHOLD:0.99}
    maybe-threshold: ${APP_SCORING_MAYBE_THRESHOLD:0.59}
    bribe-threshold: ${APP_SCORING_BRIBE_THRESHOLD:0.29}
  rate-limit:
    # Exact IP literals of reverse proxies whose X-Forwarded-For will be honored. Empty by
    # default so the rate limiter keys on the immediate TCP peer — i.e., you cannot spoof your
    # way out of your own bucket by setting XFF. In the docker-compose fullstack profile the
    # nginx sidecar sits in front of the backend, so override this env with the compose network
    # IP (or leave it as "any from the compose bridge"). On Fly.io, the edge proxy lives at
    # 127.0.0.1 / ::1 inside the Firecracker VM, so set this to that pair for the prod profile.
    trusted-proxies: ${APP_RATE_LIMIT_TRUSTED_PROXIES:}

management:
  endpoints:
    web:
      exposure:
        # Prod-safe minimum. Dev widens this in application-dev.yml. Phase 7 may re-tighten
        # further (loopback binding or basic auth) once the prod deploy lands on Fly.io.
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

info:
  app:
    name: Goblin Scheduler
    version: 0.0.1-SNAPSHOT
    description: Group availability scheduler — zero accounts required
