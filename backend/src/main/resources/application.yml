spring:
  application:
    name: goblin-scheduler
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/goblin_scheduler}
    username: ${DATABASE_USERNAME:goblin}
    password: ${DATABASE_PASSWORD:goblin}
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

server:
  port: 8080
  error:
    include-message: always

goblin:
  app-url: ${APP_URL:http://localhost:3001}
  mail:
    from: ${MAIL_FROM:noreply@goblin-scheduler.local}
    enabled: ${MAIL_ENABLED:false}
  housekeeping:
    enabled: true
    retention-days: 30
    stale-days: 90

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  max-tokens: ${GEMINI_MAX_TOKENS:1024}
