services:
  postgres:
    image: postgres:16-alpine
    container_name: goblin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goblin_sched}
      POSTGRES_USER: ${POSTGRES_USER:-goblin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goblin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - goblin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goblin} -d ${POSTGRES_DB:-goblin_sched}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    profiles: [fullstack]
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: goblin-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-goblin_sched}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-goblin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-goblin}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3001}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    profiles: [fullstack]
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: goblin-frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # nginx:alpine bundles BusyBox wget; -q silences stderr, --spider skips writing the body.
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  goblin_postgres_data:
