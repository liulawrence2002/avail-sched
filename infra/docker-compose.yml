services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goblin_scheduler
      POSTGRES_USER: goblin
      POSTGRES_PASSWORD: goblin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goblin -d goblin_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
