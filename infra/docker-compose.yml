services:
  postgres:
    image: postgres:16-alpine
    container_name: goblin-postgres
    environment:
      POSTGRES_DB: goblin_sched
      POSTGRES_USER: goblin
      POSTGRES_PASSWORD: goblin
    ports:
      - "5432:5432"
    volumes:
      - goblin_postgres_data:/var/lib/postgresql/data

volumes:
  goblin_postgres_data:

