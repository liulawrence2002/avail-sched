name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: goblin_sched
          POSTGRES_USER: goblin
          POSTGRES_PASSWORD: goblin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goblin -d goblin_sched"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Spotless (formatting)
        run: ./gradlew spotlessCheck
      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
      - name: Unit tests + JaCoCo coverage gate
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
      - name: Integration tests
        run: ./gradlew integrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/goblin_sched
          SPRING_DATASOURCE_USERNAME: goblin
          SPRING_DATASOURCE_PASSWORD: goblin
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/build/reports/jacoco/test/html
            backend/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn
      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-checkstyle
          path: backend/build/reports/checkstyle
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Upload Vitest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose -f infra/docker-compose.yml --profile fullstack up --build -d
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f infra/docker-compose.yml --profile fullstack logs backend
          exit 1
      - name: Check frontend landing page
        run: curl -fsS http://localhost:3001 | grep -q "Goblin Scheduler"
      - name: Stop full stack
        if: always()
        run: docker compose -f infra/docker-compose.yml --profile fullstack down -v
