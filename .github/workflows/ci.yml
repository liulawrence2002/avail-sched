name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: goblin_sched
          POSTGRES_USER: goblin
          POSTGRES_PASSWORD: goblin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goblin -d goblin_sched"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: ./gradlew test integrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/goblin_sched
          SPRING_DATASOURCE_USERNAME: goblin
          SPRING_DATASOURCE_PASSWORD: goblin

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose -f infra/docker-compose.yml --profile fullstack up --build -d
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f infra/docker-compose.yml --profile fullstack logs backend
          exit 1
      - name: Check frontend landing page
        run: curl -fsS http://localhost:3001 | grep -q "Goblin Scheduler"
      - name: Stop full stack
        if: always()
        run: docker compose -f infra/docker-compose.yml --profile fullstack down -v
